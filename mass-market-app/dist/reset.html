<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>MOCA — איפוס Cache</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f9f4ee; color: #5c3317;
         display: flex; flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
  h1 { font-size: 28px; margin-bottom: 8px; }
  p  { font-size: 14px; color: #888; max-width: 500px; line-height: 1.6; }
  #status { font-size: 18px; margin-top: 30px; padding: 16px 24px; border-radius: 12px;
            background: white; box-shadow: 0 2px 8px rgba(0,0,0,.06); min-width: 300px; }
  .ok    { color: #10b981; }
  .err   { color: #ef4444; }
  .work  { color: #5c3317; }
  ul { text-align: right; max-width: 500px; font-size: 13px; color: #666; }
  li { margin: 4px 0; }
</style>
</head>
<body>
  <h1>🧹 MOCA — איפוס Cache</h1>
  <p>הדף הזה מבטל Service Worker שנתקע ומנקה את כל ה-Cache, ואז מעביר אותך חזרה לאפליקציה.</p>
  <div id="status" class="work">⏳ מתחיל…</div>
  <ul id="log"></ul>

<script>
const status = document.getElementById('status');
const log = document.getElementById('log');
function add(msg) { const li = document.createElement('li'); li.textContent = '• ' + msg; log.appendChild(li); }

(async () => {
  try {
    // 1. Unregister all service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      add(`נמצאו ${regs.length} Service Workers`);
      for (const r of regs) {
        await r.unregister();
        add(`✓ בוטל: ${r.scope}`);
      }
    } else {
      add('Service Workers לא נתמכים בדפדפן');
    }

    // 2. Clear all caches
    if ('caches' in window) {
      const keys = await caches.keys();
      add(`נמצאו ${keys.length} cache buckets`);
      for (const k of keys) {
        await caches.delete(k);
        add(`✓ נמחק: ${k}`);
      }
    }

    // 3. Clear localStorage / sessionStorage *but* keep auth_token so the user stays logged in
    const token = localStorage.getItem('auth_token');
    localStorage.clear();
    sessionStorage.clear();
    if (token) localStorage.setItem('auth_token', token);
    add('✓ localStorage + sessionStorage נוקו (auth נשמר)');

    status.className = 'ok';
    status.textContent = '✅ הניקוי הושלם — מעביר אותך חזרה לאפליקציה ב-3 שניות…';
    setTimeout(() => { location.href = '/'; }, 3000);
  } catch (e) {
    status.className = 'err';
    status.textContent = '❌ שגיאה: ' + e.message;
  }
})();
</script>
</body>
</html>
